services:
  keyper_db:
    image: mysql:8.4
    container_name: keyper_db
    ports:
      - "3305:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keyper
      MYSQL_USER: admin
      MYSQL_PASSWORD: 9x*UwARA5@
    volumes:
      - keyper_db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - keyper_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  keyper:
    container_name: keyper
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      keyper_db:
        condition: service_healthy
    networks:
      - keyper_net

networks:
  keyper_net:
    driver: bridge

volumes:
  keyper_db_data:
